name: Capture landing typecheck

on:
  push:
    branches:
      - feature/figma-landing-rebuild

permissions:
  contents: write

concurrency:
  group: capture-landing-typecheck
  cancel-in-progress: true

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/figma-landing-rebuild
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Capture compiler output
        shell: bash
        run: |
          set +e
          npm run typecheck > ../docs/releases/2026-07-14-frontend-typecheck.txt 2>&1
          status=$?
          printf '\nTYPECHECK_EXIT_CODE=%s\n' "$status" >> ../docs/releases/2026-07-14-frontend-typecheck.txt
          exit 0

      - name: Commit diagnostic output
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/releases/2026-07-14-frontend-typecheck.txt
          git commit -m "chore(landing): capture frontend typecheck output"
          git push origin HEAD:feature/figma-landing-rebuild
