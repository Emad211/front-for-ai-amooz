name: tests

# CI for the test-suite program (ADR-0003). The backend job runs on a REAL
# Postgres service so the org raw-SQL migrations (DO $$…$$) actually run — the
# sqlite `--no-migrations` fast lane is local-only. benchmark tests never run here.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (pytest on postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ai_amooz
          POSTGRES_USER: ai_amooz
          POSTGRES_PASSWORD: ai_amooz_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ai_amooz -d ai_amooz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Postgres = migration truth (real migrations run via --create-db).
      DATABASE_URL: postgresql://ai_amooz:ai_amooz_password@localhost:5432/ai_amooz
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SECRET_KEY: ci-insecure-test-key-not-for-production
      DEBUG: "True"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system libs (WeasyPrint runtime + ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg libpango-1.0-0 libpangocairo-1.0-0 libcairo2 \
            libgdk-pixbuf-2.0-0 libffi-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests (real migrations + coverage)
        run: |
          python -m pytest -m "not benchmark" \
            --create-db \
            --cov --cov-branch \
            --cov-config=backend/pyproject.toml \
            --cov-report=term-missing \
            --cov-report=xml
        # NOTE: no --cov-fail-under yet; the floor (baseline 79%) is pinned at T26.

  frontend:
    name: frontend (typecheck + lint)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint
