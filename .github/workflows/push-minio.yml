name: Pull MinIO Image

on:
  workflow_dispatch:

jobs:
  pull-minio:
    runs-on: ubuntu-latest
    steps:
      - name: Pull MinIO from quay.io
        run: |
          docker pull quay.io/minio/minio:latest
          docker save quay.io/minio/minio:latest | gzip > minio-latest.tar.gz

      - name: Upload image archive
        uses: actions/upload-artifact@v4
        with:
          name: minio-image
          path: minio-latest.tar.gz
          retention-days: 1
