[pytest]
DJANGO_SETTINGS_MODULE = core.settings
python_files = tests.py test_*.py *_tests.py
addopts = --reuse-db --strict-markers
markers =
	unit: pure logic — no DB, no network (services pure fns, *_utils, adaptive_quiz math)
	service: a service function against the test DB / a mocked LLM client
	api: DRF APIClient request→response contract (incl. negative auth/permission)
	integration: Celery-eager + service + DB wired together (pipeline steps, pregeneration)
	permission: negative auth matrix (401/403/409 anon/wrong-role/cross-tenant) — cross-cuts `api`
	smoke: tiny does-it-boot set (health, schema, one login) for CI fast-lane
	slow: >~2s (concurrency, big-payload) — excludable from the fast lane
	benchmark: opt-in accuracy benchmarks (require real LLM keys; skipped by default)
